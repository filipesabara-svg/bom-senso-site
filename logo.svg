<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">

  <!-- COROA - 3 picos acima do escudo -->
  <g stroke="#B8860B" stroke-width="1.4" fill="none">
    <!-- base da coroa -->
    <line x1="70" y1="52" x2="130" y2="52"/>
    <!-- pico esquerdo -->
    <polyline points="70,52 78,38 86,52"/>
    <!-- pico central (mais alto) -->
    <polyline points="86,52 100,28 114,52"/>
    <!-- pico direito -->
    <polyline points="114,52 122,38 130,52"/>
  </g>

  <!-- ESCUDO EXTERNO (contorno duplo) -->
  <!-- Escudo heráldico francês: topo com vértice central, ombros, ponta inferior -->
  <path d="
    M100 58
    L142 66
    L155 100
    C155 140 138 172 100 188
    C62 172 45 140 45 100
    L58 66
    Z"
    stroke="#B8860B" stroke-width="1.8" fill="none"/>
  <!-- Filete interno paralelo -->
  <path d="
    M100 65
    L138 72
    L149 103
    C149 138 134 166 100 181
    C66 166 51 138 51 103
    L62 72
    Z"
    stroke="#B8860B" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- LOSANGO CENTRAL (no terço superior do escudo) -->
  <polygon points="100,80 122,110 100,140 78,110"
           stroke="#B8860B" stroke-width="1.4" fill="none"/>
  <!-- Ornamentos nos 4 vértices do losango -->
  <circle cx="100" cy="80" r="2" fill="#B8860B"/>
  <circle cx="122" cy="110" r="2" fill="#B8860B"/>
  <circle cx="100" cy="140" r="2" fill="#B8860B"/>
  <circle cx="78" cy="110" r="2" fill="#B8860B"/>

  <!-- ESTRELA DE 5 PONTAS (dentro do losango, sólida) -->
  <polygon
    points="100,88 103.8,99.6 116,99.6 106.1,106.8 109.9,118.4 100,111.2 90.1,118.4 93.9,106.8 84,99.6 96.2,99.6"
    fill="#B8860B"/>

  <!-- RAMOS DE LOUROS (laterais inferiores) -->
  <!-- Ramo esquerdo -->
  <g stroke="#B8860B" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M78 175 Q58 178 46 165"/>
    <path d="M75 172 Q55 168 48 152"/>
    <path d="M72 168 Q55 158 52 142"/>
    <!-- folhas -->
    <ellipse cx="50" cy="161" rx="5" ry="3" transform="rotate(-30 50 161)" fill="#B8860B" fill-opacity="0.35" stroke="none"/>
    <ellipse cx="52" cy="147" rx="5" ry="3" transform="rotate(-20 52 147)" fill="#B8860B" fill-opacity="0.35" stroke="none"/>
    <ellipse cx="48" cy="163" rx="5" ry="3" transform="rotate(-40 48 163)" fill="#B8860B" fill-opacity="0.35" stroke="none"/>
    <!-- voluta final -->
    <path d="M46 165 Q42 170 44 175" stroke-linecap="round"/>
  </g>
  <!-- Ramo direito (espelhado) -->
  <g stroke="#B8860B" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M122 175 Q142 178 154 165"/>
    <path d="M125 172 Q145 168 152 152"/>
    <path d="M128 168 Q145 158 148 142"/>
    <!-- folhas -->
    <ellipse cx="150" cy="161" rx="5" ry="3" transform="rotate(30 150 161)" fill="#B8860B" fill-opacity="0.35" stroke="none"/>
    <ellipse cx="148" cy="147" rx="5" ry="3" transform="rotate(20 148 147)" fill="#B8860B" fill-opacity="0.35" stroke="none"/>
    <ellipse cx="152" cy="163" rx="5" ry="3" transform="rotate(40 152 163)" fill="#B8860B" fill-opacity="0.35" stroke="none"/>
    <!-- voluta final -->
    <path d="M154 165 Q158 170 156 175" stroke-linecap="round"/>
  </g>

  <!-- LINHA DECORATIVA + LEMA -->
  <line x1="42" y1="196" x2="80" y2="196" stroke="#B8860B" stroke-width="0.8" opacity="0.7"/>
  <line x1="120" y1="196" x2="158" y2="196" stroke="#B8860B" stroke-width="0.8" opacity="0.7"/>
  <text x="100" y="199.5" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="6.5" fill="#B8860B" letter-spacing="2.8" opacity="0.95">
    VERITAS · ORDO · LIBERTAS
  </text>

</svg>
